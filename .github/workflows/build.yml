name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Tweak using Theos
        uses: Randomblock1/theos-action@v1

      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v3
        with:
          name: PoolBreakPredictor
          path: .theos/obj/debug/PoolBreakPredictor.dylib
